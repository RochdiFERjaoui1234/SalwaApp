buildscript {
    ext.kotlin_version = '1.8.10' // Define the Kotlin version here
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:4.1.3'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version" // Use the defined Kotlin version
        // Add the Google Services plugin dependency
       classpath 'com.google.gms:google-services:4.3.15'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Define a variable to control whether to apply the Google Services plugin
def applyGoogleServices = project.hasProperty('applyGoogleServices') ? project.applyGoogleServices.toBoolean() : true

// Apply the Google Services plugin conditionally
if (applyGoogleServices) {
    apply plugin: 'com.google.gms.google-services'
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
